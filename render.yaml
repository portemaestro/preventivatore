services:
  - type: web
    name: preventivatore
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: preventivatore-db
          property: connectionString

databases:
  - name: preventivatore-db
    region: frankfurt
    plan: free
